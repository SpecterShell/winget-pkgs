ReleaseNotes: |-
  [改善项目]
  - 优化备份任务的显示方式，让用户更直觉掌握任务状态。
  - 更新内核组件以提升整体兼容性与系统运作稳定度。
  [修复问题]
  - 修正大型文件传输过程中可能发生的连接中断问题，提升传输稳定性。
  - 修正特定情境下应用程序可能发生异常状况，提升整体运作稳定性。
  - 修正 QNAP ID（QID）相关提示显示不完整的问题，使连接状态更清楚。
  - 修正备份任务结果与纪录显示不一致的问题，提供更正确的任务信息。
  - 修正部分操作与接口显示异常问题，提升使用体验。
